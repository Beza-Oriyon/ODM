services:
  - type: web
    name: online-dorm-server
    env: node
    region: Oregon
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        value: ${MONGODB_URI}
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_USER
        value: ${EMAIL_USER}
      - key: EMAIL_PASS
        value: ${EMAIL_PASS}
    autoDeploy: true

  - type: web
    name: online-dorm-client
    env: static
    region: Oregon
    buildCommand: cd client && npm install && npm run build
    staticPublish: ../client/dist
    envVars:
      - key: VITE_API_URL
        value: https://online-dorm-server.onrender.com
    autoDeploy: true